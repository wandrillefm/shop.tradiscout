<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commande confirmée — Verso L'Alto</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
  --bg-color: #e2e5b3;
  --navy: #0a1d37;
  --overlay-yellow: rgba(226, 229, 179, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-image: 
    linear-gradient(var(--overlay-yellow), var(--overlay-yellow)),
    url('IMG_5189.jpeg');
  background-size: 100% auto;
  background-position: center center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  background-color: var(--bg-color);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
header {
  padding: 2rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid rgba(10, 29, 55, 0.15);
  position: sticky;
  top: 0;
  background: rgba(226, 229, 179, 0.95);
  backdrop-filter: blur(8px);
  z-index: 50;
}

.logo {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  color: var(--navy);
  text-transform: uppercase;
}

/* PANIER BOUTON */
.cart-btn {
  background: transparent;
  border: 1px solid rgba(10, 29, 55, 0.3);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  font-size: 0.95rem;
  letter-spacing: 0.1em;
  padding: 0.6rem 1rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.cart-btn:hover {
  border-color: var(--navy);
  color: var(--navy);
  background: rgba(10, 29, 55, 0.05);
}

.cart-count {
  background: var(--navy);
  color: var(--bg-color);
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 0.55rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 500;
}

/* HERO */
.hero {
  padding: 4rem 3rem 2rem;
}

.hero h1 {
  font-family: 'Uncial Antiqua', cursive;
  font-size: clamp(2.5rem, 7vw, 6rem);
  font-weight: 400;
  line-height: 0.9;
  color: var(--navy);
}

.hero h1 em {
  font-style: italic;
  color: var(--navy);
}

.hero p {
  margin-top: 1rem;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  color: var(--navy);
  text-transform: capitalize;
}

/* SHOP LAYOUT */
.shop {
  padding: 2rem 3rem 4rem;
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 4rem;
  max-width: 1200px;
  margin: 0 auto;
}

/* PREVIEW */
.preview-zone {
  position: sticky;
  top: 5rem;
  height: fit-content;
}

.garment-visual {
  aspect-ratio: 3/4;
  border: 1px solid rgba(10, 29, 55, 0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.5rem;
  position: relative;
  overflow: hidden;
  background: #f9f7f0;
  transition: background 0.4s ease;
}

.garment-visual.blanc { background: #f5f2eb; }
.garment-visual.marine { background: #e2e5b3; }

.garment-shape { width: 55%; transition: all 0.3s ease; }
.garment-shape svg { width: 100%; height: auto; }

.shape-fill-blanc .garment-path { fill: #f5f2eb; stroke: #ccc; }
.shape-fill-marine .garment-path { fill: #e2e5b3; stroke: #d4d8a0; }

.design-preview {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  text-align: center;
  font-family: 'Sanchez', serif;
  font-style: italic;
  font-size: 0.9rem;
  line-height: 1.5;
  letter-spacing: 0.05em;
  opacity: 0.85;
  transition: all 0.4s ease;
  color: var(--navy);
}

.garment-visual.blanc .design-preview { color: var(--navy); }
.garment-visual.marine .design-preview { color: var(--navy); }

.garment-label {
  position: absolute;
  bottom: 1.2rem;
  left: 1.2rem;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--navy);
  font-weight: 600;
}

.price-display {
  position: absolute;
  top: 1.2rem;
  right: 1.2rem;
  font-family: 'Sanchez', serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--navy);
}

/* CONFIG PANEL */
.config-panel { display: flex; flex-direction: column; gap: 2rem; }

.config-section { display: flex; flex-direction: column; gap: 0.7rem; }

.config-label {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--navy);
  padding-bottom: 0.4rem;
  border-bottom: 1px solid rgba(10, 29, 55, 0.15);
  font-weight: 600;
}

.options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }

.opt-btn, .size-btn, .color-btn, .design-btn {
  background: transparent;
  border: 1px solid rgba(10, 29, 55, 0.2);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  cursor: pointer;
  transition: all 0.2s ease;
}

.opt-btn {
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.8rem 0.4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3rem;
}

.opt-btn .opt-price { font-size: 0.7rem; color: var(--navy); opacity: 0.7; }

.sizes-row, .colors-row { display: flex; gap: 0.5rem; }

.size-btn { flex: 1; font-size: 0.9rem; letter-spacing: 0.08em; padding: 0.7rem; }

.color-btn {
  flex: 1;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.color-dot.blanc { background: #f5f2eb; border: 1px solid #ccc; }
.color-dot.marine { background: #e2e5b3; border: 1px solid #d4d8a0; }

.designs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

.design-btn {
  font-family: 'Sanchez', serif;
  font-style: italic;
  font-size: 0.85rem;
  line-height: 1.5;
  padding: 0.9rem 0.8rem;
  text-align: center;
}

.design-btn .design-num {
  display: block;
  font-family: 'Sanchez', serif;
  font-style: normal;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--navy);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
  font-weight: 600;
}

.opt-btn:hover, .size-btn:hover, .color-btn:hover, .design-btn:hover {
  border-color: rgba(10, 29, 55, 0.4);
  background: rgba(10, 29, 55, 0.05);
}

.opt-btn.selected, .size-btn.selected, .color-btn.selected, .design-btn.selected {
  border-color: var(--navy);
  background: rgba(10, 29, 55, 0.1);
  color: var(--navy);
  font-weight: 600;
}

/* BOUTON AJOUTER AU PANIER */
.add-btn {
  width: 100%;
  padding: 1rem;
  background: transparent;
  border: 1px solid var(--navy);
  color: var(--navy);
  font-family: 'Sanchez', serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  font-weight: 600;
}

.add-btn:hover {
  background: var(--navy);
  color: var(--bg-color);
}

.add-btn:disabled {
  border-color: #ccc;
  color: #999;
  cursor: not-allowed;
}

.add-btn:disabled:hover { background: transparent; color: #999; }

.missing-msg {
  font-size: 0.75rem;
  color: var(--navy);
  letter-spacing: 0.08em;
  text-align: center;
  margin-top: 0.4rem;
  min-height: 1rem;
  opacity: 0.6;
}

/* ═══ DRAWER PANIER ═══ */
.cart-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.3);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.cart-overlay.open { opacity: 1; pointer-events: all; }

.cart-drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: 420px;
  max-width: 100vw;
  height: 100vh;
  background: var(--bg-color);
  border-left: 1px solid rgba(10, 29, 55, 0.15);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.35s ease;
  display: flex;
  flex-direction: column;
}

.cart-drawer.open { transform: translateX(0); }

.cart-header {
  padding: 1.5rem;
  border-bottom: 1px solid rgba(10, 29, 55, 0.15);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.cart-title {
  font-family: 'Uncial Antiqua', cursive;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--navy);
}

.cart-close {
  background: transparent;
  border: none;
  color: var(--navy);
  font-size: 1.2rem;
  cursor: pointer;
  padding: 0.3rem;
  transition: color 0.2s;
}

.cart-close:hover { color: var(--navy); opacity: 0.7; }

.cart-items {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.cart-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-size: 0.9rem;
  color: var(--navy);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.5;
}

.cart-item {
  border: 1px solid rgba(10, 29, 55, 0.15);
  padding: 1rem;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.5rem;
  align-items: start;
  animation: slideIn 0.25s ease both;
  background: rgba(10, 29, 55, 0.03);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(10px); }
  to { opacity: 1; transform: translateX(0); }
}

.item-name {
  font-family: 'Sanchez', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--navy);
}

.item-details {
  font-size: 0.8rem;
  color: var(--navy);
  letter-spacing: 0.05em;
  margin-top: 0.2rem;
  line-height: 1.7;
  opacity: 0.7;
}

.item-price {
  font-family: 'Sanchez', serif;
  font-size: 1.1rem;
  color: var(--navy);
  font-weight: 600;
}

.item-remove {
  background: transparent;
  border: none;
  color: var(--navy);
  font-size: 0.75rem;
  cursor: pointer;
  transition: color 0.2s;
  padding: 0;
  display: block;
  text-align: right;
  margin-top: 0.3rem;
  opacity: 0.5;
}

.item-remove:hover { opacity: 1; }

.cart-footer {
  padding: 1.5rem;
  border-top: 1px solid rgba(10, 29, 55, 0.15);
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.cart-total-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.cart-total-label {
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--navy);
  opacity: 0.6;
}

.cart-total-amount {
  font-family: 'Sanchez', serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--navy);
}

.checkout-btn {
  width: 100%;
  padding: 1.1rem;
  background: var(--navy);
  color: var(--bg-color);
  border: none;
  font-family: 'Sanchez', serif;
  font-size: 0.95rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.25s ease;
  font-weight: 600;
}

.checkout-btn:hover { background: rgba(10, 29, 55, 0.85); }
.checkout-btn:disabled { background: #ccc; color: #999; cursor: not-allowed; }

.checkout-loading { display: none; }
.checkout-btn.loading .checkout-text { display: none; }
.checkout-btn.loading .checkout-loading { display: inline; }

/* TOAST */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--navy);
  color: var(--bg-color);
  font-family: 'Sanchez', serif;
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  padding: 0.7rem 1.4rem;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 300;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer {
  text-align: center;
  padding: 2rem;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  color: var(--navy);
  text-transform: uppercase;
  border-top: 1px solid rgba(10, 29, 55, 0.1);
  opacity: 0.6;
}

@media (max-width: 900px) {
  .shop { grid-template-columns: 1fr; }
  .preview-zone { position: static; }
  .garment-visual { aspect-ratio: 4/3; }
  header, .hero, .shop { padding-left: 1.5rem; padding-right: 1.5rem; }
  .cart-drawer { width: 100vw; }
}
  </style>
</head>
<body>
  <div class="check">✓</div>
  <h1>Commande <em>confirmée</em></h1>
  <p>Merci pour ta commande ! Tu recevras un email de confirmation Stripe avec les détails. Nous traiterons ta commande dans les meilleurs délais.</p>
  <a href="/">← Retour à la boutique</a>
</body>
</html>
