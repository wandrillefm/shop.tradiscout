<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boutique Tradiscout — Verso L'Alto</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Sanchez&family=Uncial+Antiqua&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #e2e5b3;
      --navy: #0a1d37;
      --white: #fffcf0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg);
      background-image: linear-gradient(rgba(226,229,179,0.7), rgba(226,229,179,0.7)), url('IMG_5189.jpeg');
      background-size: cover;
      background-attachment: fixed;
      color: var(--navy);
      font-family: 'Sanchez', serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1400px;
      margin: 0 auto 3rem auto;
    }

    .logo { font-family: 'Uncial Antiqua'; font-size: 2.5rem; }

    /* BOUTON PANIER */
    .cart-trigger {
      background: var(--navy); color: var(--bg);
      border: none; padding: 12px 20px;
      font-family: 'Uncial Antiqua'; cursor: pointer;
      display: flex; gap: 10px; align-items: center;
      transition: 0.3s;
    }
    .cart-trigger:hover { opacity: 0.9; }

    /* GRILLE 6 SUR PC / 3 SUR TEL */
    .product-grid {
      display: grid;
      max-width: 1400px;
      margin: 0 auto;
      grid-template-columns: repeat(6, 1fr);
      gap: 15px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid var(--navy);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .product-card:hover { transform: translateY(-5px); border-width: 2px; }

    .product-img {
      width: 100%; aspect-ratio: 1 / 1;
      object-fit: cover; border-bottom: 1px solid var(--navy);
      display: block;
    }

    .product-info { padding: 12px; text-align: center; }
    .product-info h3 { font-family: 'Uncial Antiqua'; font-size: 0.9rem; margin-bottom: 4px; }
    .product-info p { font-size: 0.85rem; }

    /* LIGHTBOX */
    .modal {
      position: fixed; inset: 0;
      background: rgba(10, 29, 55, 0.9);
      display: none; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal.open { display: flex; }

    .modal-content {
      background: var(--bg); width: 100%; max-width: 900px;
      border: 2px solid var(--navy); display: grid;
      grid-template-columns: 1fr 1fr; position: relative;
    }

    .modal-close { position: absolute; top: 10px; right: 15px; font-size: 2.5rem; cursor: pointer; z-index: 10; color: var(--navy); }

    .modal-left img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .modal-right { padding: 40px; display: flex; flex-direction: column; gap: 20px; }
    .modal-right h2 { font-family: 'Uncial Antiqua'; font-size: 2rem; }
    .price-tag { font-family: 'Uncial Antiqua'; font-size: 1.6rem; color: var(--navy); }

    .label-title { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-opt {
      padding: 8px 15px; border: 1px solid var(--navy);
      background: transparent; font-family: 'Sanchez'; cursor: pointer; font-size: 0.85rem;
    }
    .btn-opt.active { background: var(--navy); color: var(--bg); }

    .add-btn {
      margin-top: auto; padding: 18px;
      background: var(--navy); color: var(--bg);
      border: none; font-family: 'Uncial Antiqua'; cursor: pointer; font-size: 1.1rem;
    }

    /* PANIER (On utilise tes classes de boutique.css) */
    @import url('css/boutique.css');

    @media (max-width: 1100px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 768px) {
      .modal-content { grid-template-columns: 1fr; max-height: 90vh; overflow-y: auto; }
      header { flex-direction: column; gap: 1.5rem; text-align: center; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">tradiscout shop</div>
  <button class="cart-trigger" onclick="openCart()">
    Panier (<span id="cart-count">0</span>)
  </button>
</header>

<div class="product-grid">
  <div class="product-card" onclick="openQuickView('tshirt', 17, 'IMG_5189.jpeg')">
    <img src="IMG_5189.jpeg" class="product-img">
    <div class="product-info"><h3>T-Shirt</h3><p>17 €</p></div>
  </div>
  <div class="product-card" onclick="openQuickView('sweat', 33, 'IMG_5189.jpeg')">
    <img src="IMG_5189.jpeg" class="product-img">
    <div class="product-info"><h3>Sweat</h3><p>33 €</p></div>
  </div>
  <div class="product-card" onclick="openQuickView('hoodie', 37, 'IMG_5189.jpeg')">
    <img src="IMG_5189.jpeg" class="product-img">
    <div class="product-info"><h3>Hoodie</h3><p>37 €</p></div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="modal-close" onclick="closeModal()">×</span>
    <div class="modal-left"><img src="" id="modalImg"></div>
    <div class="modal-right">
      <h2 id="modalTitle">PRODUIT</h2>
      <p id="modalPrice" class="price-tag">0 €</p>
      
      <div>
        <p class="label-title">Taille</p>
        <div class="btn-group" id="sizes">
          <button class="btn-opt active" onclick="select(this, 'size')">S</button>
          <button class="btn-opt" onclick="select(this, 'size')">M</button>
          <button class="btn-opt" onclick="select(this, 'size')">L</button>
          <button class="btn-opt" onclick="select(this, 'size')">XL</button>
        </div>
      </div>

      <div>
        <p class="label-title">Couleur</p>
        <div class="btn-group" id="colors">
          <button class="btn-opt active" onclick="select(this, 'color')">Marine</button>
          <button class="btn-opt" onclick="select(this, 'color')">Coton</button>
        </div>
      </div>

      <div>
        <p class="label-title">Citation</p>
        <div class="btn-group" id="designs">
          <button class="btn-opt active" onclick="select(this, 'design')">1</button>
          <button class="btn-opt" onclick="select(this, 'design')">2</button>
          <button class="btn-opt" onclick="select(this, 'design')">3</button>
          <button class="btn-opt" onclick="select(this, 'design')">4</button>
        </div>
      </div>

      <button class="add-btn" onclick="confirmAdd()">Ajouter au panier</button>
    </div>
  </div>
</div>

<script src="js/boutique.js"></script>

<script>
  let currentSelection = { type: '', price: 0, size: 'S', color: 'marine', design: '1' };

  function openQuickView(type, price, img) {
    currentSelection.type = type;
    currentSelection.price = price;
    document.getElementById('modalImg').src = img;
    document.getElementById('modalTitle').innerText = type.toUpperCase();
    document.getElementById('modalPrice').innerText = price + " €";
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  function select(btn, type) {
    currentSelection[type] = btn.innerText;
    btn.parentElement.querySelectorAll('.btn-opt').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function confirmAdd() {
    // Appelle TA fonction addToCart du fichier boutique.js
    addToCart(
      currentSelection.type, 
      currentSelection.price, 
      currentSelection.size, 
      currentSelection.color, 
      currentSelection.design
    );
    closeModal();
    openCart(); // Ouvre ton panier drawer
  }

  window.onclick = (e) => { if (e.target.id == 'modal') closeModal(); }
</script>

</body>
</html>
