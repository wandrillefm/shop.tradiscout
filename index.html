<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boutique Tradiscout</title>
    <link rel="icon" type="image/x-icon" href="FINAL.png">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root { --navy: #2C3776; --bg: #F8F2E7; --or: #c9a84c; --gris: #6b6b6b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--navy); font-family: 'DM Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; }

        header { position: sticky; top: 0; z-index: 1000; background: rgba(248, 242, 231, 0.96); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(44,55,118,0.12); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; height: 64px; }
        .logo { font-family: 'Uncial Antiqua', serif; text-transform: uppercase; letter-spacing: 2px; font-size: 1.6rem; color: var(--navy); text-decoration: none; }
        .main-nav { display: flex; gap: 32px; align-items: center; }
        .main-nav a { text-decoration: none; color: var(--navy); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: lowercase; opacity: 0.4; transition: 0.2s; position: relative; padding-bottom: 3px; }
        .main-nav a:hover, .main-nav a.active { opacity: 1; }
        .main-nav a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background: var(--navy); }

        /* RIDEAU STYLISÉ (S'affiche à la place du contenu) */
        #shop-curtain {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
            background: var(--bg);
            border: 1px solid rgba(44,55,118,0.05);
            margin: 20px 5%;
            position: relative;
        }
        .curtain-content { max-width: 500px; border: 1px solid var(--navy); padding: 60px 40px; position: relative; }
        .curtain-title { font-family: 'Uncial Antiqua', serif; font-size: 1.8rem; margin-bottom: 15px; color: var(--navy); line-height: 1.2; }
        .curtain-sub { font-size: 0.7rem; letter-spacing: 0.2em; opacity: 0.6; text-transform: uppercase; }
        
        /* Accès admin discret */
        .admin-unlock { position: absolute; bottom: 10px; right: 10px; display: flex; align-items: center; gap: 8px; }
        #adminInput { display: none; padding: 5px; border: 1px solid var(--navy); font-family: 'DM Mono'; font-size: 0.6rem; width: 100px; outline: none; }
        .lock-icon { cursor: pointer; opacity: 0.15; font-size: 0.7rem; transition: 0.3s; }
        .lock-icon:hover { opacity: 1; }

        /* CONTENU DE LA BOUTIQUE (Caché par défaut) */
        #shop-content { display: none; flex: 1; }
        .top-info-bar { max-width: 1100px; margin: 40px auto 0; padding: 20px 5%; display: flex; justify-content: space-between; align-items: flex-start; gap: 60px; }
        .info-text p { font-size: 0.75rem; line-height: 2; margin-bottom: 15px; }
        .grid-wrap { max-width: 1100px; margin: 3rem auto; padding: 0 5% 6rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(44,55,118,0.1); border: 1px solid rgba(44,55,118,0.1); }
        .grid-card { background: white; padding: 20px; text-align: center; }

        /* FOOTER */
        footer { background: var(--navy); color: var(--bg); padding: 64px 5% 40px; margin-top: auto; }
        .footer-inner { max-width: 860px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; }
        .footer-col-title { font-size: 0.52rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--or); margin-bottom: 25px; display: block; }
        .footer-links { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .footer-links li a { color: var(--bg); text-decoration: none; display: flex; flex-direction: column; gap: 2px; }
        .footer-links li a .fl-label { font-size: 0.46rem; text-transform: uppercase; opacity: 0.5; }
        .footer-links li a .fl-name { font-size: 0.62rem; }
        .footer
